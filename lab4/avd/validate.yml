---
# =============================================================================
# VALIDATE PLAYBOOK
# =============================================================================
# Runs automated network state validation using ANTA (Arista Network Test
# Automation). The ANTA test catalog is generated automatically by build.yml
# (eos_designs role) based on the fabric data model.
#
# Tests include:
#   - Interface state (all fabric interfaces must be up/up)
#   - BGP underlay sessions (eBGP between each leaf and the spine)
#   - BGP EVPN overlay sessions
#   - VTEP reachability (Loopback1 IPs reachable via underlay)
#   - VXLAN VNI configuration
#
# Results are saved to the reports/ directory.
#
# Note: eos_validate_state was removed in AVD 6.x — use anta_runner instead.
# See: https://avd.arista.com/6.x/docs/howto/migrate-to-anta-runner.html
#
# Run with:
#   ansible-playbook validate.yml

- name: "Validate: Run ANTA network state tests"
  hosts: FABRIC
  gather_facts: false
  tasks:
    - name: Run ANTA tests
      ansible.builtin.import_role:
        name: arista.avd.anta_runner
