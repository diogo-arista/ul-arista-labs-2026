---
# =============================================================================
# NETWORK SERVICES (TENANTS, VLANs)
# =============================================================================
# This file defines Layer 2 services for the fabric.
# AVD translates this high-level intent into VXLAN VNI configuration and
# BGP EVPN MAC-VRF entries on every leaf switch.
#
# We use a pure L2 VLAN (l2vlans) here, which gives us:
#   - VLAN 10 configured on both leaf1 and leaf2
#   - VNI 10010 assigned (mac_vrf_vni_base + vlan_id = 10000 + 10)
#   - VXLAN interface mapped: VLAN 10 ↔ VNI 10010
#   - BGP EVPN MAC-VRF 10010 advertising Type-2 routes
#
# This is the same VXLAN concept you configured manually in Lab 3,
# but now AVD generates all the configuration automatically.

tenants:
  - name: ACME_CORP
    # Base VNI for MAC-VRFs. The actual VNI = mac_vrf_vni_base + vlan_id.
    # VLAN 10 → VNI 10010
    mac_vrf_vni_base: 10000

    l2vlans:
      - id: 10
        name: Servers

# =============================================================================
# CHALLENGE: Day 2 Operation
# =============================================================================
# To add a new VLAN to the fabric, add a new entry under l2vlans:
#
#       - id: 20
#         name: Management
#
# Then re-run: ansible-playbook build.yml && ansible-playbook deploy.yml
# =============================================================================
