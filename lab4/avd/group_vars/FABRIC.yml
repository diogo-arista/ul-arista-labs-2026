---
# =============================================================================
# FABRIC-WIDE DESIGN SETTINGS
# =============================================================================
# This file defines the overall design choices for the entire fabric.
# AVD uses these settings when generating configurations for all nodes.

fabric_name: FABRIC

# --- Routing protocols ---
# The underlay carries reachability between loopback IPs (BGP next-hops).
# The overlay carries EVPN routes (MAC/IP advertisements for VXLAN).
underlay_routing_protocol: ebgp
overlay_routing_protocol: ebgp

# --- BGP peer groups ---
# AVD creates these peer groups on every device. Named clearly so they
# are easy to identify in the generated EOS configuration.
bgp_peer_groups:
  ipv4_underlay_peers:
    name: IPv4-UNDERLAY-PEERS
  evpn_overlay_peers:
    name: EVPN-OVERLAY-PEERS

# --- BGP load balancing ---
bgp_maximum_paths: 4
bgp_ecmp: 4

# --- Management interface ---
# cEOS uses Management0. AVD will configure this interface on every device.
mgmt_gateway: 172.20.20.1
mgmt_interface: Management0
mgmt_vrf: default

# --- P2P uplink MTU ---
# Use 1500 in containerlab to avoid fragmentation issues.
# In production you would typically use 9214 (jumbo frames).
p2p_uplinks_mtu: 1500

# --- EVPN ---
# Import pruning reduces unnecessary EVPN route imports.
evpn_import_pruning: true
