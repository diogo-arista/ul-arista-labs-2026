---
# =============================================================================
# SPINE NODE DEFINITIONS
# =============================================================================
# Spines form the backbone of the fabric. They run eBGP with every leaf
# (underlay) and act as EVPN route reflectors (overlay).

# This tells AVD the role of all nodes in the SPINES inventory group.
type: spine

spine:
  defaults:
    platform: cEOSLab
    bgp_as: "65001"
    # Loopback0 IPs are assigned sequentially from this pool.
    # spine1 (id=1) → 192.168.255.1/32
    loopback_ipv4_pool: 192.168.255.0/27
    bgp_defaults:
      - no bgp default ipv4-unicast

  nodes:
    - name: spine1
      id: 1
      mgmt_ip: 172.20.20.11/24
