---
# =============================================================================
# DEPLOY PLAYBOOK  (SSH merge mode)
# =============================================================================
# Pushes the generated EOS configurations to devices via SSH using merge mode.
# Unlike "configure replace", merge mode only applies the differences — it is
# much lighter on CPU and never risks cutting management connectivity.
#
# Prerequisites:
#   - build.yml must have run first (intended/configs/ must exist)
#   - SSH reachable on port 22 for all devices
#
# Run with:
#   ansible-playbook deploy.yml

- name: "Deploy: Push configurations via SSH (merge mode)"
  hosts: FABRIC
  gather_facts: false
  vars:
    ansible_connection: network_cli
    ansible_network_os: eos
    ansible_become: true
    ansible_become_method: enable
  tasks:
    - name: Merge intended configuration onto device
      arista.eos.eos_config:
        src: "{{ playbook_dir }}/intended/configs/{{ inventory_hostname }}.cfg"
