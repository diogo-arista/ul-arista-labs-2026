---
# =============================================================================
# DEPLOY PLAYBOOK  (eAPI merge mode)
# =============================================================================
# Merges the generated EOS configurations onto devices via eAPI (httpapi).
# Uses arista.eos.eos_config in the default merge mode — only the differences
# are applied, line by line. This is far lighter than "configure replace" and
# never disrupts management connectivity.
#
# Prerequisites:
#   - build.yml must have run first (intended/configs/ must exist)
#   - eAPI (HTTP port 80) reachable on all devices
#
# Run with:
#   ansible-playbook deploy.yml

- name: "Deploy: Merge configurations via eAPI"
  hosts: FABRIC
  gather_facts: false
  tasks:
    - name: Merge intended configuration onto device
      arista.eos.eos_config:
        src: "{{ playbook_dir }}/intended/configs/{{ inventory_hostname }}.cfg"
