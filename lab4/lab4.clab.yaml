name: lab4
topology:
  nodes:
    spine1:
      kind: arista_ceos
      cpu: 1
      cpu-set: 0-1
      mgmt-ipv4: 172.20.20.11
      startup-config: configs/spine1.cfg
      binds:
        - files/EosIntfMapping.json:/mnt/flash/EosIntfMapping.json:ro

    leaf1:
      kind: arista_ceos
      cpu: 1
      cpu-set: 0-1
      mgmt-ipv4: 172.20.20.12
      startup-config: configs/leaf1.cfg
      binds:
        - files/EosIntfMapping.json:/mnt/flash/EosIntfMapping.json:ro

    leaf2:
      kind: arista_ceos
      cpu: 1
      cpu-set: 2-3
      mgmt-ipv4: 172.20.20.13
      startup-config: configs/leaf2.cfg
      binds:
        - files/EosIntfMapping.json:/mnt/flash/EosIntfMapping.json:ro

  kinds:
    arista_ceos:
      image: ceos:latest

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
